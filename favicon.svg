<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#060a10"/>
  <!-- Subtle teal glow -->
  <circle cx="16" cy="16" r="14" fill="#26c6da" fill-opacity="0.08"/>
  <!-- Teal ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#26c6da" stroke-width="0.75" stroke-opacity="0.45"/>
  <!-- Gold 5-pointed star
       Outer r=11  at angles -90°, -18°, 54°, 126°, 198°
       Inner r=4.5 at angles -54°,  18°, 90°, 162°, 234° -->
  <polygon
    points="16,5 18.5,11.7 25.5,12 20.3,16.7 22.1,23.7 16,19.8 9.9,23.7 11.7,16.7 6.5,12 13.5,11.7"
    fill="#f5c842"
  />
  <!-- Inner highlight to give it a slight shimmer -->
  <polygon
    points="16,7.5 17.8,12.5 23,12.8 18.8,16.2 20.3,21.5 16,18.4 11.7,21.5 13.2,16.2 9,12.8 14.2,12.5"
    fill="#fff8d0"
    fill-opacity="0.3"
  />
</svg>
